name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  deploy:
    name: Deploy to home-server
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, home-server]
    steps:
      - uses: actions/checkout@v4
        with:
          # Docker writes root-owned files under data/; without this, checkout's
          # git-clean tries (and fails) to delete them. data/ is gitignored, so
          # skipping the clean is safe.
          clean: false
      - name: Restore persistent .env
        run: |
          # Secrets live on the server, outside the repo checkout.
          # Create ~/med-reminder.env once (copy of .env.example + real values).
          if [ -f "$HOME/med-reminder.env" ]; then
            cp "$HOME/med-reminder.env" .env
            echo "Using persistent env from \$HOME/med-reminder.env"
          else
            echo "::error::$HOME/med-reminder.env not found on the runner. Create it once before deploying."
            exit 1
          fi
      - name: Build & start stack
        run: docker compose up -d --build --remove-orphans
      - name: Prune old images
        run: docker image prune -f
      - name: Health check
        run: |
          sleep 10
          curl -fsS http://localhost:${BACKEND_PORT:-8000}/health || (docker compose logs --tail=50 backend && exit 1)
