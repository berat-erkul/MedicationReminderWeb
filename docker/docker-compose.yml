services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: med-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: sqlite:////app/data/medication.db
      WHATSAPP_SERVICE_URL: http://whatsapp:3001
      OLLAMA_BASE_URL: http://ollama:11434
      NTFY_BASE_URL: http://ntfy:80
      NTFY_TOPIC: ${NTFY_TOPIC:-medication-reminders}
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
    volumes:
      - ../data/backend:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    depends_on:
      - whatsapp
      - ntfy

  whatsapp:
    build:
      context: ../whatsapp
      dockerfile: Dockerfile
    container_name: med-whatsapp
    restart: unless-stopped
    environment:
      PORT: 3001
      BACKEND_WEBHOOK_URL: http://backend:8000/api/webhooks/whatsapp
      AUTH_DIR: /data/auth_info
    volumes:
      - ../data/whatsapp:/data
    ports:
      - "${WHATSAPP_PORT:-3001}:3001"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: med-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: med-ntfy
    restart: unless-stopped
    command: serve
    environment:
      NTFY_BASE_URL: http://ntfy:80
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_CACHE_DURATION: 48h
      # Home LAN default: anyone on the network can read/write topics.
      # For internet exposure, set NTFY_AUTH_DEFAULT_ACCESS=deny-all and add tokens.
      NTFY_AUTH_DEFAULT_ACCESS: read-write
    volumes:
      - ../data/ntfy:/var/cache/ntfy
    ports:
      - "${NTFY_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: med-ollama
    restart: unless-stopped
    volumes:
      - ../data/ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    # Uncomment on machines with NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  default:
    name: medication-net
